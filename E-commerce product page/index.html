<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Boutique 💖</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <h2>🛍️ Fashion Boutique</h2>

        <div class="cart-box">
            Cart 🛒 <span id="cartCount">0</span>
        </div>
    </nav>

    <div class="container">

        <!-- Product Images -->

        <div class="gallery">

            <img
                id="mainImage"
                src="https://images.pexels.com/photos/6311392/pexels-photo-6311392.jpeg"
                alt="Clothing Product"
            >

            <div class="thumbnails">

                <img
                    src="https://images.pexels.com/photos/6311392/pexels-photo-6311392.jpeg"
                    alt=""
                >

                <img
                    src="https://images.pexels.com/photos/5698849/pexels-photo-5698849.jpeg"
                    alt=""
                >

                <img
                    src="https://images.pexels.com/photos/6311606/pexels-photo-6311606.jpeg"
                    alt=""
                >

                <img
                    src="https://images.pexels.com/photos/6311668/pexels-photo-6311668.jpeg"
                    alt=""
                >

            </div>

        </div>

        <!-- Product Details -->

        <div class="product-info">

            <h1> Oversized Hoodie 🎀</h1>

            <p class="price">₹1,299</p>

            <p class="description">
                Stay cozy and stylish with this oversized hoodie.
                Soft fabric, relaxed fit, and perfect for everyday wear.
            </p>

            <div class="quantity-section">

                <button id="minusBtn">−</button>

                <span id="quantity">1</span>

                <button id="plusBtn">+</button>

            </div>

            <button id="addCartBtn" class="add-btn">
                Add To Cart 💕
            </button>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
